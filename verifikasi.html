<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memproses Verifikasi Griya Ananda...</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center font-sans text-gray-800 p-4">
    
    <div class="bg-white p-8 rounded-2xl shadow-md max-w-sm w-full text-center border border-gray-200">
        
        <div id="loading" class="space-y-4">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
            <h2 class="text-lg font-bold text-gray-700">Memproses Verifikasi...</h2>
            <p class="text-xs text-gray-400">Sedang memperbarui status & mengambil password Wi-Fi.</p>
        </div>

        <div id="success" class="hidden space-y-4">
            <div class="text-5xl">🟢</div>
            <h2 class="text-lg font-bold text-emerald-600">Berhasil Diverifikasi!</h2>
            <p class="text-xs text-gray-500">Status di Sheets diperbarui. Menuju ke WhatsApp...</p>
            <a id="btnWa" href="#" class="inline-block mt-2 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 rounded-xl text-sm shadow">
                BUKA WHATSAPP MANUAL
            </a>
        </div>

        <div id="error" class="hidden space-y-4">
            <div class="text-5xl">❌</div>
            <h2 class="text-lg font-bold text-red-600">Gagal Memproses</h2>
            <p id="errorMsg" class="text-xs text-gray-500">Koneksi terputus atau baris salah.</p>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyqEB2SCl1Rw9x-ScuHknTldaUD6RPVuUkDyc1czCnR7W1Ar0lQGZquh7wtH7TgMwFK/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const row = urlParams.get('row');

        if (!row) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMsg').innerText = "Parameter baris data tidak terbaca.";
        } else {
            // Tembak API Apps Script di background tanpa peduli login akun Chrome/Drive HP
            fetch(API_URL + "?action=api_verify&row=" + row)
                .then(res => res.json())
                .then(result => {
                    document.getElementById('loading').classList.add('hidden');
                    if (result.status === "success") {
                        document.getElementById('success').classList.remove('hidden');
                        document.getElementById('btnWa').href = result.waLink;
                        // Langsung lempar otomatis ke WhatsApp
                        window.location.href = result.waLink;
                    } else {
                        document.getElementById('error').classList.remove('hidden');
                        document.getElementById('errorMsg').innerText = result.message;
                    }
                })
                .catch(err => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').classList.remove('hidden');
                    document.getElementById('errorMsg').innerText = "Gagal menghubungi server database.";
                });
        }
    </script>
</body>
</html>
