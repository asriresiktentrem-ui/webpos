<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web POS - Simple Payment</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans text-gray-800">

    <div class="max-w-md mx-auto space-y-6">
        
        <div class="bg-blue-600 text-white p-4 rounded-xl shadow-md text-center">
            <h1 class="text-xl font-bold">Internal Web POS</h1>
            <p class="text-xs opacity-80">Database: Google Sheets API</p>
        </div>

        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold mb-4 border-b pb-2 text-gray-700">Input Pembayaran</h2>
            <form id="paymentForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">NAMA TENANT</label>
                    <input type="text" id="namaTenant" required placeholder="Contoh: Tenant Kopi A" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">JUMLAH BAYAR (Rp)</label>
                    <input type="number" id="jumlahBayar" required placeholder="Contoh: 50000" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">METODE PEMBAYARAN</label>
                    <select id="metode" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white">
                        <option value="QRIS">QRIS</option>
                        <option value="TUNAI">TUNAI</option>
                        <option value="TRANSFER">TRANSFER</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">TANGGAL</label>
                    <input type="date" id="tanggal" required class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition text-sm shadow-md cursor-pointer">
                    SIMPAN & PROSES NOTA
                </button>
            </form>
        </div>

        <div id="wrapperStruk" class="hidden space-y-4">
            <div id="notaVisual" class="bg-white p-6 rounded-lg shadow-sm border border-dashed border-gray-400 font-mono text-xs text-black max-w-[320px] mx-auto bg-amber-50/20">
                <div class="text-center space-y-1 border-b border-dashed border-gray-400 pb-3 mb-3">
                    <h3 class="text-sm font-bold tracking-wider">STRUK PEMBAYARAN</h3>
                    <p class="text-[10px] text-gray-500">Sistem POS Internal Sheets</p>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between"><span>ID TRANS:</span><span id="stId" class="font-bold"></span></div>
                    <div class="flex justify-between"><span>TENANT:</span><span id="stTenant"></span></div>
                    <div class="flex justify-between"><span>METODE:</span><span id="stMetode"></span></div>
                    <div class="flex justify-between"><span>TANGGAL:</span><span id="stTanggal"></span></div>
                    <div class="border-t border-dashed border-gray-400 pt-2 flex justify-between text-sm font-bold">
                        <span>TOTAL:</span>
                        <span id="stTotal"></span>
                    </div>
                </div>
                <div class="text-center mt-4 border-t border-dashed border-gray-400 pt-3 text-[10px] text-gray-500">
                    * TERIMA KASIH *<br>Data Telah Masuk Database Cloud
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col gap-2">
                <button id="btnDownload" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2 cursor-pointer shadow">
                    💾 Unduh Gambar Nota (.PNG)
                </button>
                <a id="btnWA" target="_blank" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2 text-center shadow cursor-pointer">
                    💬 Kirim WhatsApp (Deep Link)
                </a>
            </div>
        </div>

    </div>

    <script>
        // Konfigurasi URL API GAS Anda yang sudah terdeploy aktif
        const API_URL = "https://script.google.com/macros/s/AKfycbwfiusFi26FQieEOa-oWHsO6OLwa2fdEgmeQoXuTuoqsSaydyXR1yoj7l1yNW_Dc5Sd/exec";

        // Set otomatis tanggal hari ini di input form
        document.getElementById('tanggal').valueToDate = new Date();
        document.getElementById('tanggal').value = new Date().toISOString().substring(0, 10);

        const form = document.getElementById('paymentForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const wrapperStruk = document.getElementById('wrapperStruk');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Lock tombol saat loading proses kirim data
            btnSubmit.disabled = true;
            btnSubmit.innerText = "MENYIMPAN DATA...";

            // Ambil data dari form input
            const payload = {
                nama_tenant: document.getElementById('namaTenant').value,
                jumlah_bayar: parseInt(document.getElementById('jumlahBayar').value),
                metode: document.getElementById('metode').value,
                tanggal: document.getElementById('tanggal').value
            };

            try {
                // Kirim data ke Google Sheets via GAS Web App API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Mode no-cors wajib untuk memotong CORS Apps Script standar
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Generate Dummy ID lokal untuk visual karena mode no-cors tidak mengembalikan JSON response
                const txId = "TXID-" + Date.now();

                // Inject data ke komponen visual struk nota
                document.getElementById('stId').innerText = txId;
                document.getElementById('stTenant').innerText = payload.nama_tenant;
                document.getElementById('stMetode').innerText = payload.metode;
                document.getElementById('stTanggal').innerText = payload.tanggal;
                document.getElementById('stTotal').innerText = "Rp " + payload.jumlah_bayar.toLocaleString('id-ID');

                // Tampilkan container struk & tombol aksi
                wrapperStruk.classList.remove('hidden');
                
                // Format Teks pesan untuk Deep Link WhatsApp
                const teksWA = `*VERIFIKASI PEMBAYARAN POS*\n----------------------------------------\n*ID Transaksi:* ${txId}\n*Tenant:* ${payload.nama_tenant}\n*Metode:* ${payload.metode}\n*Tanggal:* ${payload.tanggal}\n*Total:* Rp ${payload.jumlah_bayar.toLocaleString('id-ID')}\n----------------------------------------\n_Data sukses direkam secara real-time di sistem cloud spreadsheet._\n\n*(Silakan tempel/paste gambar nota yang sudah diunduh)*`;
                
                // Set Link tombol WhatsApp dengan format URI encode
                document.getElementById('btnWA').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(teksWA)}`;
                
                // Scroll otomatis fokus ke area struk setelah diproses
                wrapperStruk.scrollIntoView({ behavior: 'smooth' });
                alert("Data berhasil dikirim ke Sheets!");

            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan sistem, periksa koneksi internet.");
            } finally {
                // Reset status tombol submit
                btnSubmit.disabled = false;
                btnSubmit.innerText = "SIMPAN & PROSES NOTA";
            }
        });

        // Logika Capture HTML Struk menjadi Gambar PNG secara lokal di browser HP
        document.getElementById('btnDownload').addEventListener('click', () => {
            const targetElement = document.getElementById('notaVisual');
            
            html2canvas(targetElement, {
                scale: 3, // Meningkatkan resolusi agar teks nota tajam/tidak pecah di layar HP
                logging: false,
                useCORS: true
            }).then(canvas => {
                const imageBase64 = canvas.toDataURL("image/png");
                
                // Trigger download file gambar lokal langsung di Chrome HP
                const link = document.createElement('a');
                link.download = `Nota-${document.getElementById('stId').innerText}.png`;
                link.href = imageBase64;
                link.click();
            });
        });
    </script>
</body>
</html>
