<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Owner - Kuitansi Griya Ananda</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <style>
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-card { box-shadow: none !important; border: 1px solid #000 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
        }
        #kuitansiCaptureArea {
            background-color: #ffffff !important;
            padding: 20px !important;
            width: 100% !important;
            max-width: 340px !important;
            box-sizing: border-box !important;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center font-sans text-gray-800 p-4">
    
    <div id="kuitansiCaptureArea" class="bg-white p-6 rounded-xl shadow-md border border-gray-200 print-card space-y-5">
        
        <div id="loading" class="text-center py-8 space-y-3 no-print">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="text-sm font-semibold text-gray-500">Memproses Data Kuitansi...</p>
        </div>

        <div id="successContent" class="hidden space-y-4">
            <div class="text-center border-b pb-3 border-dashed border-gray-300">
                <h2 class="text-xl font-black text-gray-800 tracking-wide">GRIYA ANANDA</h2>
                <p class="text-xs text-gray-500 font-medium">Hunian Kos Eksklusif & Nyaman</p>
                <div class="mt-2 inline-block bg-emerald-100 text-emerald-800 text-[11px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">
                    ✓ Terverifikasi Lunas
                </div>
            </div>

            <div class="space-y-2.5 font-mono text-xs">
                <div class="flex justify-between"><span class="text-gray-500">ID NOTA  :</span><span id="txId" class="font-bold text-gray-800"></span></div>
                <div class="flex justify-between"><span class="text-gray-500">TANGGAL  :</span><span id="txTanggal" class="text-gray-800"></span></div>
                <hr class="border-dashed border-gray-200 my-1">
                <div class="flex justify-between"><span class="text-gray-500">PENGHUNI :</span><span id="txNama" class="font-bold text-gray-800 uppercase"></span></div>
                <div class="flex justify-between"><span class="text-gray-500">NO KAMAR :</span><span id="txKamar" class="text-gray-800 font-bold"></span></div>
                <div class="flex justify-between"><span class="text-gray-500">PERIODE  :</span><span id="txPeriode" class="text-gray-800"></span></div>
                <hr class="border-dashed border-gray-300 my-2">
                <div class="flex justify-between text-sm font-bold bg-gray-50 p-2 rounded border"><span class="text-indigo-700">TOTAL    :</span><span id="txTotal" class="text-indigo-700"></span></div>
            </div>

            <div class="text-center border-t pt-3 border-dashed border-gray-300 text-[10px] text-gray-400 leading-relaxed">
                Tanda terima bukti pembayaran internal milik manajemen Griya Ananda.
            </div>
        </div>

        <div id="error" class="hidden text-center py-6 space-y-3 no-print">
            <div class="text-5xl">❌</div>
            <h2 class="text-lg font-bold text-red-600">Gagal Memproses</h2>
            <p id="errorMsg" class="text-xs text-gray-500">Jalur tidak valid.</p>
        </div>
    </div>

    <div id="actionPanel" class="hidden mt-4 w-full max-w-sm bg-white p-4 rounded-xl border shadow-sm space-y-4 no-print">
        <h3 class="text-xs font-bold text-gray-700 border-b pb-1.5 uppercase tracking-wider">⚙️ Panel Kontrol Verifikasi</h3>
        
        <div class="space-y-2">
            <label class="block text-[11px] font-bold text-gray-500 uppercase">1. Pilih Dokumen yang Mau Dikirim:</label>
            <div class="grid grid-cols-2 gap-2">
                <label class="flex items-center gap-2 p-2.5 border rounded-lg cursor-pointer hover:bg-gray-50 text-xs">
                    <input type="radio" name="fileType" value="png" checked class="h-4 w-4 text-indigo-600">
                    <span>🖼️ Gambar (.PNG)</span>
                </label>
                <label class="flex items-center gap-2 p-2.5 border rounded-lg cursor-pointer hover:bg-gray-50 text-xs">
                    <input type="radio" name="fileType" value="pdf" class="h-4 w-4 text-indigo-600">
                    <span>📄 Berkas (.PDF)</span>
                </label>
            </div>
        </div>

        <div class="bg-gray-50 p-2.5 rounded-lg border border-gray-200">
            <label class="flex items-center gap-2.5 cursor-pointer text-xs font-semibold text-gray-700">
                <input type="checkbox" id="downloadOpt" checked class="h-4 w-4 rounded text-indigo-600">
                <span>💾 Simpan file yang dipilih ke HP Owner</span>
            </label>
        </div>

        <button onclick="eksekusiVerifikasiOwner()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-xs shadow tracking-wide transition cursor-pointer text-center">
            🚀 PROSES VERIFIKASI & BUKA WHATSAPP
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyqEB2SCl1Rw9x-ScuHknTldaUD6RPVuUkDyc1czCnR7W1Ar0lQGZquh7wtH7TgMwFK/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const row = urlParams.get('row');
        let whatsappLinkTarget = "#";

        if (!row) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMsg').innerText = "Parameter row kosong.";
        } else {
            fetch(API_URL + "?action=api_verify_payment&row=" + row)
                .then(res => res.json())
                .then(result => {
                    document.getElementById('loading').classList.add('hidden');
                    if (result.status === "success") {
                        document.getElementById('successContent').classList.remove('hidden');
                        document.getElementById('actionPanel').classList.remove('hidden');
                        
                        document.getElementById('txId').innerText = result.details.invoice_id;
                        document.getElementById('txTanggal').innerText = result.details.tanggal;
                        document.getElementById('txNama').innerText = result.details.penyewa;
                        document.getElementById('txKamar').innerText = result.details.kamar;
                        document.getElementById('txPeriode').innerText = result.details.periode;
                        document.getElementById('txTotal').innerText = result.details.total;
                        
                        whatsappLinkTarget = result.waLink;
                    } else {
                        document.getElementById('error').classList.remove('hidden');
                        document.getElementById('errorMsg').innerText = result.message;
                    }
                })
                .catch(err => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').classList.remove('hidden');
                    document.getElementById('errorMsg').innerText = "Gagal terhubung ke database.";
                });
        }

        function eksekusiVerifikasiOwner() {
            const tipeFile = document.querySelector('input[name="fileType"]:checked').value;
            const wajibDownload = document.getElementById('downloadOpt').checked;
            const currentId = document.getElementById('txId').innerText || "KUITANSI";

            if (tipeFile === "pdf") {
                if (wajibDownload) {
                    window.print();
                }
                window.location.href = whatsappLinkTarget;
            } else {
                const target = document.getElementById('kuitansiCaptureArea');
                htmlToImage.toPng(target, { backgroundColor: '#ffffff', pixelRatio: 3 })
                .then(function (dataUrl) {
                    if (wajibDownload) {
                        const link = document.createElement('a');
                        link.download = `Kuitansi_${currentId}.png`;
                        link.href = dataUrl;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                    setTimeout(() => {
                        window.location.href = whatsappLinkTarget;
                    }, 500);
                })
                .catch(function (error) {
                    alert("Gagal memproses gambar: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
